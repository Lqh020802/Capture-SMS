name: Build Keepalive AAR

on:
  push:
    paths:
      - 'android-plugin/**'
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build AAR
        working-directory: android-plugin
        run: gradle :keepalive:assembleRelease

      - name: Replace bundled AAR
        run: |
          cp android-plugin/keepalive/build/outputs/aar/keepalive-release.aar nativeplugins/Capture-Keepalive/android/Capture-Keepalive.aar

      - name: Commit replaced AAR
        run: |
          if git diff --quiet -- nativeplugins/Capture-Keepalive/android/Capture-Keepalive.aar; then
            echo "No AAR changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nativeplugins/Capture-Keepalive/android/Capture-Keepalive.aar
          git commit -m "Update bundled keepalive AAR"
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: Capture-Keepalive
          path: android-plugin/keepalive/build/outputs/aar/keepalive-release.aar
          retention-days: 30

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android-plugin/keepalive/build/outputs/aar/keepalive-release.aar
          name: Capture-Keepalive ${{ github.ref_name }}
