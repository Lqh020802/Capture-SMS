name: Build Keepalive AAR

on:
  push:
    paths:
      - 'android-plugin/**'
    branches: [ main, master ]
  workflow_dispatch:   # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 配置 Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: 编译 AAR
        working-directory: android-plugin
        run: gradle :keepalive:assembleRelease

      - name: 上传 AAR 产物
        uses: actions/upload-artifact@v4
        with:
          name: Capture-Keepalive
          path: android-plugin/keepalive/build/outputs/aar/keepalive-release.aar
          retention-days: 30

      - name: 发布到 Release（仅 tag 触发时）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android-plugin/keepalive/build/outputs/aar/keepalive-release.aar
          name: Capture-Keepalive ${{ github.ref_name }}
